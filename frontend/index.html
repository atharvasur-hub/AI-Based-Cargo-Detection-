<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIIBS Cargo Security Scanner</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 font-sans">
    
    <nav class="bg-blue-900 text-white p-4 shadow-md">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-wide">CIIBS Intelligence Dashboard</h1>
            <span class="bg-blue-700 px-3 py-1 rounded-full text-sm">Live Analyst Mode</span>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto mt-8 p-4 grid grid-cols-1 md:grid-cols-3 gap-8">
        
        <div class="col-span-1 bg-white p-6 rounded-lg shadow-sm border border-slate-200 h-fit">
            <h2 class="text-lg font-semibold mb-4 border-b pb-2">Scan New Cargo</h2>
            
            <form id="uploadForm" class="space-y-4">
                <div class="border-2 border-dashed border-slate-300 rounded-lg p-6 text-center hover:bg-slate-50 transition">
                    <input type="file" id="imageInput" accept="image/*" class="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer"/>
                </div>
                
                <button type="submit" id="scanButton" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded transition flex justify-center items-center">
                    <span>Initiate Scan</span>
                </button>
            </form>

            <div id="loading" class="hidden mt-4 text-center text-blue-600 font-semibold animate-pulse">
                Analyzing X-Ray Signatures...
            </div>
        </div>

        <div class="col-span-2 space-y-6">
            
            <div id="statusAlert" class="hidden p-4 rounded-lg font-medium"></div>

            <div class="bg-white p-6 rounded-lg shadow-sm border border-slate-200">
                <h2 class="text-lg font-semibold mb-4 border-b pb-2">X-Ray Viewer</h2>
                <div class="bg-slate-900 rounded flex justify-center items-center overflow-hidden min-h-[400px]">
                    <img id="resultImage" class="hidden max-w-full max-h-[600px] object-contain" alt="Scan Result">
                    <p id="placeholderText" class="text-slate-500">Awaiting cargo image upload...</p>
                </div>
            </div>

            <div class="bg-white p-6 rounded-lg shadow-sm border border-slate-200">
                <h2 class="text-lg font-semibold mb-4 border-b pb-2">Detection Log</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-100 text-slate-600 text-sm">
                                <th class="p-3 border-b">Threat Category</th>
                                <th class="p-3 border-b">Confidence Score</th>
                                <th class="p-3 border-b">Risk Level</th>
                            </tr>
                        </thead>
                        <tbody id="resultsTableBody">
                            <tr>
                                <td colspan="3" class="p-3 text-center text-slate-500 italic">No threats detected yet.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>

    <script>
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const fileInput = document.getElementById('imageInput');
            const scanButton = document.getElementById('scanButton');
            const loading = document.getElementById('loading');
            const resultImage = document.getElementById('resultImage');
            const placeholderText = document.getElementById('placeholderText');
            const tableBody = document.getElementById('resultsTableBody');
            const statusAlert = document.getElementById('statusAlert');

            if (!fileInput.files[0]) {
                alert('Please select an image first.');
                return;
            }

            // UI Updates: Show loading state
            scanButton.disabled = true;
            scanButton.classList.add('opacity-50');
            loading.classList.remove('hidden');
            statusAlert.classList.add('hidden');

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            try {
                // Send the image to your Python FastAPI server
                const response = await fetch('http://localhost:8000/predict', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) throw new Error('Server error');

                const data = await response.json();

                // Display the annotated image returned by your AI
                resultImage.src = 'data:image/jpeg;base64,' + data.annotated_image_base64;
                resultImage.classList.remove('hidden');
                placeholderText.classList.add('hidden');

                // Clear old table results
                tableBody.innerHTML = '';

                // Populate the table with new detections
                if (data.detections.length === 0) {
                    statusAlert.className = 'p-4 rounded-lg font-medium bg-green-100 text-green-800';
                    statusAlert.innerText = '✅ CLEAR: No suspicious items detected.';
                    statusAlert.classList.remove('hidden');
                    tableBody.innerHTML = '<tr><td colspan="3" class="p-3 text-center text-slate-500 italic">Clear.</td></tr>';
                } else {
                    statusAlert.className = 'p-4 rounded-lg font-medium bg-red-100 text-red-800 border border-red-200';
                    statusAlert.innerText = `⚠️ ALERT: ${data.detections.length} suspicious object(s) flagged for manual review.`;
                    statusAlert.classList.remove('hidden');

                    data.detections.forEach(det => {
                        const score = (det.confidence * 100).toFixed(1);
                        // Determine risk color based on score
                        let riskColor = score > 80 ? 'text-red-600 font-bold' : 'text-orange-500 font-semibold';
                        let riskLabel = score > 80 ? 'HIGH' : 'MEDIUM';

                        const row = `
                            <tr class="border-b hover:bg-slate-50">
                                <td class="p-3 font-medium capitalize">${det.class_name}</td>
                                <td class="p-3">${score}%</td>
                                <td class="p-3 ${riskColor}">${riskLabel}</td>
                            </tr>
                        `;
                        tableBody.innerHTML += row;
                    });
                }

            } catch (error) {
                console.error('Error:', error);
                alert('Failed to connect to the AI Server. Is your Python backend running?');
            } finally {
                // UI Updates: Restore button
                scanButton.disabled = false;
                scanButton.classList.remove('opacity-50');
                loading.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
